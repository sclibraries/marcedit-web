services:
  marcedit-web:
    image: ${MARCEDIT_WEB_IMAGE:?Set MARCEDIT_WEB_IMAGE to a published image, for example ghcr.io/OWNER/REPO:latest}
    container_name: marcedit-web
    pull_policy: always
    ports:
      # Loopback only. :8501 carries unauthenticated traffic that Apache
      # attests (TASK-073); it must never be reachable by untrusted local
      # apps or off-box.
      - "127.0.0.1:${MARCEDIT_WEB_PORT:-8501}:8501"
    volumes:
      - ${MARCEDIT_WEB_DATA_DIR:-./data}:/app/data
      # OAuth secrets are NOT baked into the published image (TASK-069). The
      # Shibboleth / REMOTE_USER production deployment does not need them. If you
      # use the Streamlit OAuth path (st.login), provide secrets at runtime —
      # add an `env_file: .env` to this service or mount a secrets file:
      #   - ./.streamlit/secrets.toml:/app/.streamlit/secrets.toml:ro
    environment:
      PYTHONUNBUFFERED: "1"
      STREAMLIT_SERVER_MAX_UPLOAD_SIZE: "${STREAMLIT_SERVER_MAX_UPLOAD_SIZE:-2048}"
      MARCEDIT_WEB_PROD: "${MARCEDIT_WEB_PROD:-}"
      MARCEDIT_WEB_AUDIT_DIR: "${MARCEDIT_WEB_AUDIT_DIR:-/app/data/audit}"
      MARCEDIT_WEB_ADMINS: "${MARCEDIT_WEB_ADMINS:-}"
      MARCEDIT_WEB_PROXY_SECRET: "${MARCEDIT_WEB_PROXY_SECRET:-}"
      MARCEDIT_WEB_MAX_UPLOAD_BYTES: "${MARCEDIT_WEB_MAX_UPLOAD_BYTES:-2147483648}"
      MARCEDIT_WEB_MAX_DIFF_BYTES: "${MARCEDIT_WEB_MAX_DIFF_BYTES:-2147483648}"
      MARCEDIT_WEB_MAX_TASKSFILE_BYTES: "${MARCEDIT_WEB_MAX_TASKSFILE_BYTES:-1048576}"
      MARCEDIT_WEB_MAX_SESSION_BYTES: "${MARCEDIT_WEB_MAX_SESSION_BYTES:-4294967296}"
    restart: unless-stopped