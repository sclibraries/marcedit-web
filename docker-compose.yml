services:
  marcedit-web:
    build: .
    image: marcedit-web:dev
    container_name: marcedit-web
    ports:
      # Loopback only (TASK-073): never expose :8501 beyond the host.
      - "127.0.0.1:8501:8501"
    volumes:
      - ./marcedit_web:/app/marcedit_web:ro
      - ./data:/app/data
      - ./.streamlit:/app/.streamlit:ro
      - ./tests:/app/tests:ro
      - ./pyproject.toml:/app/pyproject.toml:ro
      - ./docker-compose.yml:/app/docker-compose.yml:ro
    environment:
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_MAX_UPLOAD_SIZE=2048
      - MARCEDIT_WEB_PROXY_SECRET=${MARCEDIT_WEB_PROXY_SECRET:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    restart: unless-stopped
